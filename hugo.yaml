baseURL: 'https://omid.dev/'
title: Omid Farhang
theme: omid-dev
copyright: '© 2026 Omid Farhang | All rights reserved.'
defaultContentLanguage: en

# Permalinks
permalinks:
  posts: /:year/:month/:day/:slug/

# Taxonomies
taxonomies:
  category: categories
  tag: tags

# Privacy Settings
privacy:
  vimeo:
    disabled: false
  twitter:
    disabled: false
  instagram:
    disabled: false
  youtube:
    disabled: false
    privacyEnhanced: true

# Related Content
related:
  threshold: 80
  includeNewer: false
  toLower: false
  indices:
    - name: keywords
      weight: 100
    - name: tags
      weight: 80
    - name: categories
      weight: 50
    - name: date
      weight: 10

# Imaging
imaging:
  anchor: Smart
  quality: 75
  resampleFilter: Lanczos

# Minify settings
minify:
  disableXML: false
  minifyOutput: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    hl_inline: false
    lineNoStart: 1
    lineNos: true
    lineNumbersInTable: true
    noClasses: false
    noHl: false
    style: monokai
    tabWidth: 4


languages:
  # English
  en:
    title: Omid Farhang
    label: ':us:'
    locale: en-US
    weight: 1
    direction: ltr
    params:
      languageAltTitle: English
      author: Omid Farhang
      description: "Omid Farhang, Frontend Architect and Engineering Lead specializing in Angular, TypeScript, Nx monorepos, design systems, and scalable web platforms."
      keywords: [Frontend Architect, Engineering Lead, Angular, TypeScript, Nx Monorepos, Design Systems, Frontend Development, Software Architecture, Team Leadership, Performance Engineering, DevOps, Linux, Omid Farhang]
      profileMode:
        enabled: true
        imageUrl: "/images/bio-photo-150x150.jpg"
        title: "Omid Farhang"
        subtitle: "Frontend Architect & Engineering Lead"
        buttons:
          - name: Explore My Blog
            url: /posts
          - name: View My Resume
            url: /resume
      footer:
        kicker: "Stay close to the work"
        title: "Engineering notes, systems thinking, and practical web craft."
        bio: "I write about frontend architecture, Angular, Linux, DevOps, and the everyday habits that make technical work more humane and durable."
        status: "Open to thoughtful frontend architecture, platform, and leadership conversations."
        ctaPrimaryText: "Start a conversation"
        ctaPrimaryUrl: /contact-me
        ctaSecondaryText: "Read the resume"
        ctaSecondaryUrl: /resume
      # homeInfoParams:
      #   Title: "Hi, I’m Omid Farhang"
      #   Content: "I'm a Senior Developer and Also a network administrator, Working freelance and hunting for linux stuff"
    # English Menu
    menu:
      main:
        - name: Posts
          url: /posts
          weight: 1
        - name: About me
          url: /about-me
          weight: 4
        - name: Contact me
          url: /contact-me
          weight: 5
      quick_links:
        - name: Posts
          url: /posts
          weight: 1
        - name: Playground
          url: https://playground.omid.dev/
          weight: 2
        - name: Resume
          url: /resume
          weight: 4
  # Persian
  fa:
    title: امید فرهنگ
