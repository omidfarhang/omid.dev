heroTagline: "سیستم‌های فرانت‌اند می‌سازم که محصول، معماری و تجربه توسعه‌دهنده در یک نقطه به هم می‌رسند."
heroLead: "پلتفرم‌های Angular، دیزاین سیستم، Nx monorepo و سیستم‌های مهندسی که به تیم‌ها اعتماد برای تحویل پایدار می‌دهد."
principles:
  - "معماری باید ریسک را کم کند، نه مراسم اضافه."
  - "پلتفرم وقتی برنده می‌شود که توسعه‌دهنده هر روز سرعت و وضوح حس کند."
  - "تیم قوی به استاندارد، استقلال و بحث فنی صادقانه نیاز دارد."
