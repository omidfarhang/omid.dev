heroTagline: "سیستم‌های فرانت‌اند می‌سازم که محصول، معماری و تجربه توسعه‌دهنده در یک نقطه به هم می‌رسند."
heroLead: "پلتفرم‌های Angular، دیزاین سیستم، Nx monorepo و سیستم‌های مهندسی که به تیم‌ها اعتماد برای تحویل پایدار می‌دهد."
principles:
  - "معماری باید ریسک را کم کند، نه مراسم اضافه."
  - "پلتفرم وقتی برنده می‌شود که توسعه‌دهنده هر روز سرعت و وضوح حس کند."
  - "تیم قوی به استاندارد، استقلال و بحث فنی صادقانه نیاز دارد."
focusAreas:
  - category: "معماری پلتفرم فرانت‌اند"
    items: ["پلتفرم‌های Angular", "دیزاین سیستم", "Nx monorepo", "Micro-frontends"]
  - category: "جهت‌دهی فنی"
    items: ["بازبینی معماری", "نوسازی کدبیس", "استانداردهای فرانت‌اند", "برنامه‌ریزی migration"]
  - category: "سیستم‌های مهندسی"
    items: ["بهینه‌سازی CI/CD", "Performance", "استراتژی تست", "تجربه توسعه‌دهنده"]
playground:
  title: "پروژه‌های همراه را در مرورگر امتحان کنید"
  lede: "برخی نوشته‌های فنی اکنون دموهای زنده در playground.omid.dev دارند — ابتدا نمونه کار را باز کنید، سپس مقاله را برای توضیح کامل بخوانید."
contactCta: "مسئله جدی در معماری فرانت‌اند، پلتفرم Angular، migration یا سیستم‌های مهندسی دارید که ارزش گفت‌وگو داشته باشد؟"
