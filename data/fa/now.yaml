last_updated: 2026-02-03
location: تهران، ایران
status: "لید فرانت‌اند در جیبیت؛ حمایت از تیم، دنبال‌کردن روندهای تازه تکنولوژی و کاوش در دنیای سلامت."
focuses:
  - title: "کار"
    icon: "fa-solid fa-people-group"
    summary: "رهبری تیم فرانت‌اند در جیبیت با تمرکز بر کیفیت پلتفرم و رشد تیم."
    content: |
      در حال حاضر لید تیم فرانت‌اند در **جیبیت** هستم. رویکرد من بیشتر بر حمایت و توانمندکردن هم‌تیمی‌ها متمرکز است تا رهبری کنترل‌محور و از بالا به پایین.
  - title: "کاوش"
    icon: "fa-solid fa-compass"
    summary: "نگاه فراتر از یک اکوسیستم: معماری، استراتژی، مهارت‌های نرم و ابزارهای نوظهور."
    content: |
      فعالانه دنبال موضوعاتی هستم که هنوز عمیق سراغشان نرفته‌ام. به‌جای فرو رفتن در یک فریم‌ورک خاص، وقت بیشتری برای خواندن درباره استراتژی‌های نرم‌افزار، مهارت‌های نرم، الگوهای معماری و ابزارها و استک‌های نوظهور می‌گذارم. هدفم این است که دیدم وسیع‌تر بماند و در یک اکوسیستم یا یک روش فکرکردن قفل نشوم.
  - title: "پروژه جانبی"
    icon: "fa-solid fa-lightbulb"
    summary: "بازطراحی ایده قدیمی دستیار زندگی واقعی با AI مدرن به‌جای منطق‌های شکننده."
    content: |
      سال‌ها پیش ایده یک استارتاپ برای «دستیار زندگی واقعی» داشتم؛ ابزاری برای کمک به تصمیم‌گیری‌های روزمره. قبل از دوران LLMها و GPT آن را با منطق و ساختارهای داده پیچیده می‌ساختم. آن رویکرد دستی حالا با AI تا حد زیادی منسوخ شده، اما مسیرش درس‌های مهمی درباره کسب‌وکار و تکنولوژی به من داد. هنوز از ایده دست نکشیده‌ام؛ فقط دارم آن را با ظرفیت AI مدرن از نو تصور می‌کنم.
  - title: "سلامت"
    icon: "fa-solid fa-heart-pulse"
    summary: "دنبال‌کردن موضوعات سلامت و پزشکی، از نرم‌افزار پزشکی تا مراقبت‌های روزمره."
    content: |
      دنیای سلامت و پزشکی برایم جذاب است؛ از دنبال‌کردن خبرهای جدید گرفته تا درمان‌های خانگی و استفاده درست از داروهای بدون نسخه. گذراندن دوره «Introduction to Medical Software» دانشگاه Yale در Coursera تجربه بسیار خوشایندی بود.
  - title: "خواندن"
    icon: "fa-solid fa-book-open"
    summary: "به‌جای یک کتاب مشخص، دنبال‌کردن مقاله‌هایی در تکنولوژی، سلامت و سیاست."
    content: |
      در حال حاضر کتاب مشخصی نمی‌خوانم. بیشتر مقاله‌هایی درباره تکنولوژی، سلامت و سیاست را دنبال می‌کنم تا نگاه چندبعدی‌تری داشته باشم و تبدیل به «انسان تک‌بعدی» نشوم.
  - title: "گوش‌دادن"
    icon: "fa-solid fa-music"
    summary: "لذت‌بردن از موسیقی دهه‌های ۱۹۴۰ و ۱۹۵۰، بخشی به خاطر فضای Fallout 4."
    content: |
      به ژانرهای مختلف گوش می‌دهم، اما موسیقی دهه‌های ۱۹۴۰ و ۱۹۵۰ اخیراً حس خاصی برایم داشته است. بخش زیادی از این حس از پلی‌لیست‌ها و فضاهای **Fallout 4** می‌آید.
