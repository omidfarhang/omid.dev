  - title: "Exploring"
    icon: "fa-solid fa-compass"
    summary: "Looking beyond a single ecosystem: architecture, strategy, soft skills, and emerging tools."
    content: |
      I'm actively looking around to discover topics I haven't explored yet. Rather than deep-diving into a single framework, I'm dedicating my time to reading about new software strategies, soft skills, architectural patterns, and emerging tools and stacks. My goal is to broaden my perspective and avoid getting "locked-in" to a single ecosystem or way of thinking - staying away from my own isolated island.
  - title: "Side Project"
    icon: "fa-solid fa-lightbulb"
    summary: "Reimagining an old real-life assistant idea with modern AI instead of brittle rule engines."
    content: |
      Years ago, I planned a startup for a "real-life assistant" - a decision maker for daily life. Before the era of LLMs and GPT, I was building it with complex logic and data structures. While that manual approach is now obsolete thanks to AI, the journey taught me invaluable lessons about business and tech. I haven't given up; instead, I'm reimagining the concept by leveraging the massive potential of modern AI.
  - title: "Health"
