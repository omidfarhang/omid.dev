{{ if .Get "summary" }}
{{ else }}
{{ warnf "missing value for param 'summary': %s" .Position }}
{{ end }}
<details class="disclosure"{{ if (eq (.Get "openByDefault") true) }} open{{ end }}>
  <summary class="disclosure__summary">{{ .Get "summary" | markdownify }}</summary>
  <div class="disclosure__body">{{ .Inner | markdownify }}</div>
</details>
