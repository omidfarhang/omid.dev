{{- define "main" -}}

<div class="page-content">
  <header class="page-header">
    <h1>
      {{ .Title }}
      {{- if (.Param "ShowRssButtonInSectionTermList") -}}
      {{- $rss := (.OutputFormats.Get "rss") -}}
      {{- with $rss -}}
      <a href="{{ .RelPermalink }}" title="RSS" aria-label="RSS">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" height="23">
          <path d="M4 11a9 9 0 0 1 9 9" />
          <path d="M4 4a16 16 0 0 1 16 16" />
          <circle cx="5" cy="19" r="1" />
        </svg>
      </a>
      {{- end -}}
      {{- end -}}
    </h1>
    {{- if .Description -}}
    <div class="post-description">{{ .Description }}</div>
    {{- end -}}
  </header>

  <nav id="archiveBreadcrumb" class="breadcrumbs" aria-label="{{ i18n "archive_breadcrumb" | default "Archive navigation" }}"></nav>

  <div id="archiveLoading" class="loading loading--panel" role="status">
    <div class="spinner spinner--lg" aria-hidden="true"></div>
    <span>{{ i18n "archive_loading" | default "Loading posts…" }}</span>
  </div>

  <div id="archivePicker" class="archive-picker" hidden></div>
</div>

<div id="archiveResults" class="archive-results posts-list-content" aria-live="polite" hidden></div>

<script type="application/json" id="archive-config">
{{- $archiveLabels := dict
  "years" (i18n "archive_years" | default "Years")
  "months" (i18n "archive_months" | default "Months")
  "days" (i18n "archive_days" | default "Days")
  "posts" (i18n "archive_posts" | default "posts")
  "post" (i18n "archive_post" | default "post")
  "allDays" (i18n "archive_all_days" | default "All days")
  "loading" (i18n "archive_loading" | default "Loading posts…")
  "empty" (i18n "archive_empty" | default "No posts found for this period.")
  "prev" (i18n "archive_prev" | default "Previous")
  "next" (i18n "archive_next" | default "Next")
  "pagination" (i18n "pagination" | default "Pagination")
  "home" (i18n "archive_breadcrumb_home" | default "Archives")
  "showing" (i18n "archive_showing" | default "Showing")
  "of" (i18n "archive_of" | default "of")
  "published" (i18n "published" | default "Published")
  "categories" (i18n "categories" | default "Categories")
  "continueReading" (i18n "continue_reading" | default "Continue Reading")
-}}
{{- $archiveConfig := dict "locale" (.Language.Lang | default "en") "labels" $archiveLabels -}}
{{ $archiveConfig | jsonify }}
</script>

{{- end -}}
