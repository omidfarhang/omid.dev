{{- define "main" }}

<div class="page-content">
<header class="page-header">
    <h1>{{- (printf "%s&nbsp;" .Title ) | htmlUnescape -}}
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </h1>
    {{- if .Description }}
    <div class="post-description">
        {{ .Description }}
    </div>
    {{- end }}
    {{- if not (.Param "hideMeta") }}
    <!-- <div class="post-meta">
        {{- partial "translation_list.html" . -}}
    </div> -->
    {{- end }}
</header>

<div id="searchbox" class="searchbox">
    <div class="search-scope" role="radiogroup" aria-label="{{ i18n "search_scope_label" | default "Search in" }}">
        <label class="search-scope-option">
            <input type="radio" name="searchScope" value="site" checked>
            <span>{{ i18n "search_scope_site" | default "Site" }}</span>
        </label>
        <label class="search-scope-option">
            <input type="radio" name="searchScope" value="notes">
            <span>{{ i18n "search_scope_notes" | default "Notes" }}</span>
        </label>
    </div>
    <input id="searchInput" autofocus placeholder="{{ .Params.placeholder | default (printf "%s ↵" .Title) }}"
        aria-label="search" type="search" autocomplete="off" maxlength="64">
    <div id="searchLoading" class="loading loading--panel" role="status" hidden>
        <div class="spinner spinner--lg" aria-hidden="true"></div>
        <span id="searchLoadingText">{{ i18n "search_loading" | default "Loading search index…" }}</span>
    </div>
</div>
</div>{{/* end page-content */}}

<div id="searchResults" class="search-results posts-list-content" aria-live="polite" hidden></div>

<script type="application/json" id="search-config">
{{- $notesSection := site.Params.notesSection | default "notes" -}}
{{- $notesIndexPage := site.GetPage $notesSection -}}
{{- $searchLabels := dict
  "showing" (i18n "archive_showing" | default "Showing")
  "of" (i18n "archive_of" | default "of")
  "published" (i18n "published" | default "Published")
  "categories" (i18n "categories" | default "Categories")
  "continueReading" (i18n "continue_reading" | default "Continue Reading")
  "prev" (i18n "prev_page" | default "Previous")
  "next" (i18n "next_page" | default "Next")
  "pagination" (i18n "pagination" | default "Pagination")
  "empty" (i18n "search_empty" | default "No results found.")
  "loading" (i18n "search_loading" | default "Loading search index…")
  "loadingNotes" (i18n "search_loading_notes" | default "Loading notes index…")
  "notes" (i18n "notes" | default "Notes")
-}}
{{- $searchConfig := dict
  "locale" (.Language.Lang | default "en")
  "labels" $searchLabels
  "indexes" (dict
    "site" "../index.json"
    "notes" (printf "%ssearch-index.json" ($notesIndexPage.RelPermalink | default "/notes/"))
  )
-}}
{{ $searchConfig | jsonify }}
</script>

{{- end }}{{/* end main */}}
