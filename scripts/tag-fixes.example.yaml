# Copy to tag-fixes.yaml and edit. Used by scripts/fix-post-tags.py
#
# Vocabulary source of truth: docs/tag-strategy.md
# Curated homepage tags (hugo.yaml params.homeTechTags*) are protected.
#
#   python3 scripts/fix-post-tags.py scan
#   python3 scripts/fix-post-tags.py apply --dry-run
#   python3 scripts/fix-post-tags.py apply

# One-to-one typo fixes and renames.
replacements:
  alanyze: analyze
  Web Disgn: Web Design
  security essnetials: Security Essentials
  Illstrator: Illustrator
  ResponsiveDesign: Responsive Design
  HighPerformance Web Applications: High-Performance Applications

# Overlapping tags collapsed to one canonical tag per post.
#
# Format variants (case, camelCase, kebab-case, spaces) are matched automatically
# via Hugo slug normalization — list variants only for different spellings or
# meanings that normalize differently (e.g. Google Mail -> gmail, browser -> Browsers).
canonical_groups:
  - canonical: gmail
    variants:
      - Google Mail
      - Googlemail
      - google-mail
      - googlemail

  - canonical: VS Code

  - canonical: Cursor IDE
    variants:
      - Cursor

  - canonical: Windows 8
    variants:
      - windows 8.1

  - canonical: Internet Explorer
    variants:
      - internet explorer 9
      - internet explorer 10
      - Internet Explorer 9
      - Internet Explorer 10
      - IE10
      - IE9

  - canonical: UI/UX
    variants:
      - UI/UX Design

  - canonical: Microservices
    variants:
      - Microservices Architecture

  - canonical: Container Orchestration
    variants:
      - Advanced Container Orchestration

  - canonical: Chaos Engineering
    variants:
      - Chaos Testing

  - canonical: Troubleshooting
    variants:
      - Troubleshooting Electronics

  - canonical: Responsive Design

  # Align post tags to hugo.yaml curated homepage spellings (safe for apply).
  - canonical: React

  - canonical: Rust

  - canonical: CSS

  - canonical: Career

  - canonical: Event-Driven Architecture

# Tags stripped from every post (case / camelCase / kebab-case matched automatically).
remove: []
